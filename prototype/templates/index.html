<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>論文リサーチアシスタント</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f0f4ff;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }
    .hero {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #0ea5e9 100%);
      color: white;
      padding: 3.5rem 1rem 5rem;
      text-align: center;
    }
    .hero h1 { font-size: clamp(1.5rem, 4vw, 2.4rem); font-weight: 700; }
    .search-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      padding: 1.75rem;
      margin-top: -3rem;
    }
    .paper-card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      transition: box-shadow 0.2s;
    }
    .paper-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .rank-badge {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.1rem; flex-shrink: 0;
    }
    .rank-1 { background: #ffd700; color: #7c5c00; }
    .rank-2 { background: #c0c0c0; color: #3a3a3a; }
    .rank-3 { background: #cd7f32; color: #fff; }
    .rank-n { background: #e2e8f0; color: #64748b; }
    .stars { color: #f59e0b; letter-spacing: 2px; font-size: 1.1rem; }
    .stars .empty { color: #e2e8f0; }
    .priority-badge {
      padding: 3px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600;
    }
    .pri-3 { background: #dcfce7; color: #16a34a; }
    .pri-2 { background: #fef3c7; color: #d97706; }
    .pri-1 { background: #f1f5f9; color: #64748b; }
    #loadingSpinner { display: none; }
    #loadingSpinner.show { display: flex; }
    .example-btn { cursor: pointer; font-size: .8rem; }
  </style>
</head>
<body>

<div class="hero">
  <div class="container">
    <h1>📚 論文リサーチアシスタント</h1>
    <p class="opacity-75 mb-1">海外論文を日本語要約 &amp; 優先度つきで表示</p>
    <small class="opacity-50">arXiv 検索 × AI 翻訳 — プロトタイプ v1</small>
  </div>
</div>

<div class="container" style="max-width: 820px; padding-bottom: 4rem;">
  <div class="search-card mb-4">
    <div class="input-group mb-2">
      <input id="searchInput" type="text" class="form-control form-control-lg"
        placeholder="研究キーワードを英語で入力（例: object detection, transformer）"
        onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-primary btn-lg px-4" onclick="doSearch()" id="searchBtn">
        🔍 検索
      </button>
    </div>
    <div class="text-muted" style="font-size:.82rem;">
      例:&nbsp;
      <span class="badge bg-light text-secondary border example-btn me-1" onclick="quickSearch('deep learning image segmentation')">image segmentation</span>
      <span class="badge bg-light text-secondary border example-btn me-1" onclick="quickSearch('reinforcement learning robotics')">RL robotics</span>
      <span class="badge bg-light text-secondary border example-btn" onclick="quickSearch('large language model reasoning')">LLM reasoning</span>
    </div>
  </div>

  <div id="loadingSpinner" class="flex-column align-items-center py-5 text-center">
    <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem;" role="status"></div>
    <p class="text-muted mb-0">arXiv を検索して日本語に翻訳中…</p>
    <small class="text-muted">30〜60 秒ほどかかります</small>
  </div>

  <div id="errorArea" class="alert alert-danger" style="display:none;"></div>

  <div id="resultsArea" style="display:none;">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <h6 class="mb-0 fw-bold text-dark" id="resultsHeader"></h6>
      <span class="badge bg-primary rounded-pill" id="resultCount"></span>
    </div>
    <div class="alert alert-info py-2 mb-3" style="font-size:.82rem;">
      ⭐ 優先度: <strong>★★★ 最優先</strong> / <strong>★★ 早めに</strong> / <strong>★ 時間があれば</strong>
      &nbsp;—&nbsp; 直近1年の論文かつ検索関連度が高いものを上位評価
    </div>
    <div id="paperList"></div>
  </div>
</div>

<footer class="text-center py-3 text-muted" style="font-size:.78rem; border-top:1px solid #e2e8f0;">
  千葉工業大学大学院 web3・AI概論 2026 — 第5回課題 プロトタイプ v1 by nagato505
</footer>

<script>
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  setLoading(true);
  document.getElementById('errorArea').style.display = 'none';
  document.getElementById('resultsArea').style.display = 'none';

  try {
    const res = await fetch('/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'エラーが発生しました'); return; }
    renderResults(data.results, query);
  } catch {
    showError('ネットワークエラーが発生しました。再度お試しください。');
  } finally {
    setLoading(false);
  }
}

function quickSearch(q) {
  document.getElementById('searchInput').value = q;
  doSearch();
}

function setLoading(on) {
  document.getElementById('loadingSpinner').classList.toggle('show', on);
  document.getElementById('searchBtn').disabled = on;
}

function showError(msg) {
  const el = document.getElementById('errorArea');
  el.textContent = msg;
  el.style.display = 'block';
}

function renderResults(results, query) {
  document.getElementById('resultsHeader').textContent = `「${query}」の検索結果`;
  document.getElementById('resultCount').textContent = results.length + '件';

  const list = document.getElementById('paperList');
  list.innerHTML = '';

  results.forEach(p => {
    const rankClass = p.rank <= 3 ? `rank-${p.rank}` : 'rank-n';
    const priClass = `pri-${p.stars}`;
    const priLabel = p.stars === 3 ? '最優先' : p.stars === 2 ? '推奨' : '参考';
    const starsHtml = '★'.repeat(p.stars) + '<span class="empty">' + '★'.repeat(3 - p.stars) + '</span>';
    const authStr = p.authors.join(', ') + (p.authors.length >= 3 ? ' ほか' : '');
    const titleEnShort = p.title_en.length > 70 ? p.title_en.slice(0, 70) + '…' : p.title_en;

    const div = document.createElement('div');
    div.className = 'paper-card';
    div.innerHTML = `
      <div class="d-flex gap-3">
        <div class="rank-badge ${rankClass}">${p.rank}</div>
        <div class="flex-grow-1 min-width-0">
          <div class="d-flex align-items-start justify-content-between gap-2 mb-1">
            <h6 class="mb-0 fw-bold" style="line-height:1.45; flex:1;">${esc(p.title_ja)}</h6>
            <div class="d-flex flex-column align-items-end gap-1 flex-shrink-0">
              <span class="priority-badge ${priClass}">${priLabel}</span>
              <span class="stars">${starsHtml}</span>
            </div>
          </div>
          <p class="text-muted mb-2" style="font-size:.8rem;">
            ${esc(authStr)}
            <span class="badge bg-light text-secondary border ms-1">${esc(p.published)}</span>
          </p>
          <p class="mb-2" style="color:#374151; font-size:.88rem; line-height:1.65;">${esc(p.abstract_ja)}</p>
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <a href="${esc(p.url)}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-primary">
              📄 arXiv で見る
            </a>
            <small class="text-muted text-truncate" style="max-width:340px;">${esc(titleEnShort)}</small>
          </div>
        </div>
      </div>`;
    list.appendChild(div);
  });

  document.getElementById('resultsArea').style.display = 'block';
}

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s || ''));
  return d.innerHTML;
}
</script>
</body>
</html>
